{% extends 'core/base.html' %}

{% block content %}
<div class="container mt-5">
    <h1 class="text-center mb-5 fw-bold">Our Academic Departments</h1>
    <div class="row">
        {% for dept in departments %}
        <div class="col-md-4 mb-4">
            <div class="card h-100 shadow">
                <img src="{{ dept.cover_image.url }}" class="card-img-top" alt="{{ dept.name }}" style="height: 200px; object-fit: cover;">
                <div class="card-body">
                    <h4 class="card-title fw-bold text-primary">{{ dept.name }}</h4>
                    <p class="text-muted small"><strong>HOD:</strong> {{ dept.hod_name }}</p>
                    <p class="card-text">{{ dept.description|truncatewords:15 }}</p>
                    <a href="{% url 'dept_detail' dept.slug %}" class="btn btn-primary">Explore Department</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
