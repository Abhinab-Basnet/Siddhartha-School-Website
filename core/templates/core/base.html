<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Name | Official Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar { background-color: #003366; } /* Professional Dark Blue */
        .nav-link { color: white !important; }
        .footer { background: #222; color: white; padding: 40px 0; margin-top: 50px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand text-white fw-bold" href="#">SCHOOL LOGO</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Academics</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Curriculum</a></li>
                            <li><a class="dropdown-item" href="{% url 'dept_list' %}">Department</a></li>
                            <li><a class="dropdown-item" href="{% url 'event_list' %}">Calendar</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'faculty_list' %}">Faculty</a></li>
                     <li class="nav-item"><a class="nav-link" href="{% url 'notice_list' %}">Notices</a></li>
                     <li class="nav-item"><a class="nav-link" href="{% url 'album_list' %}">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'contact' %}">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <footer class="footer mt-auto">
        <div class="container text-center">
            <p>&copy; 2026 Your School Name. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
