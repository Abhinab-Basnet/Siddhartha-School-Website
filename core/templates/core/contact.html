{% extends 'core/base.html' %}

{% block content %}
<div class="container mt-5">
    <h1 class="text-center mb-5 fw-bold">Get In Touch</h1>

    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="bg-light p-4 rounded shadow-sm">
                <h4>School Office</h4>
                <p>📍 123 Education Lane, Kathmandu, Nepal</p>
                <p>📞 +977-1-4000000</p>
                <p>✉️ info@schoolname.edu.np</p>
                
                <hr>
                
                <div class="ratio ratio-16x9 mt-3">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14129.610530752494!2d85.312329!3d27.708954!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39eb198a307baabf%3A0xb5137c1bf18db1ea!2sKathmandu!5e0!3m2!1sen!2snp!4v1700000000000" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    {% if messages %}
                       {% for message in messages %}
                          <div class="alert alert-success">
                             {{ message }}
                          </div>
                       {% endfor %}
                    {% endif %}
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Subject</label>
                            <input type="text" name="subject" class="form-control" placeholder="How can we help?">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Message</label>
                            <textarea name="message" class="form-control" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
