{% extends 'core/base.html' %}

{% block content %}
<div class="container mt-5">
    <h1 class="text-center mb-4">School Gallery</h1>
    <div class="row">
        {% for album in albums %}
        <div class="col-md-4 mb-4">
            <div class="card h-100 shadow-sm border-0">
                <img src="{{ album.cover_image.url }}" class="card-img-top" style="height: 250px; object-fit: cover;">
                <div class="card-body text-center">
                    <h5 class="card-title fw-bold">{{ album.title }}</h5>
                    <p class="text-muted small">{{ album.photos.count }} Photos</p>
                    <a href="{% url 'album_detail' album.pk %}" class="btn btn-outline-primary w-100">View Album</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
